
services:
  sd-editor:
    image: ghcr.io/knaw-huc/service-huc-editor:2.0-rc11
    restart: unless-stopped
    environment:
      - BASE_URL=http://localhost:1210
      - CDN_URL=http://localhost:1310/
    volumes:
      - ./data:/home/huc/huc-editor-service/data
      - ./ccf_config_en.js:/home/huc/huc-editor-service/resources/static/js/ccf_config_en.js
    networks:
      - sd-editor
    ports:
      - '1210:1210'
  sd-editor-cdn:
    image: ghcr.io/knaw-huc/huc-generic-editor:1.0-rc7
    restart: unless-stopped
    ports:
      - 1310:80
    networks:
      - sd-editor

networks:
  sd-editor:
    external: false
